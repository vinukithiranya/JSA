version: '3.8'

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://rigpro:rigpro@db:5432/rigpro_jsa
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: rigpro
      POSTGRES_PASSWORD: rigpro
      POSTGRES_DB: rigpro_jsa
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
