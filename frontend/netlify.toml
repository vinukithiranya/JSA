[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://rigpro-backend-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://rigpro-backend-production.up.railway.app/health"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
